<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Coordinator - Green Room Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#10b981', secondary: '#064e3b' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center relative font-sans p-4">

    <!-- Background Effects -->
    <div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-blue-500/20 rounded-full blur-[100px] -z-10 mix-blend-screen"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-indigo-500/20 rounded-full blur-[100px] -z-10 mix-blend-screen"></div>

    <a href="dashboard.html" class="absolute top-6 left-6 px-4 py-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-slate-300 hover:text-white flex items-center gap-2 transition-all backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Dashboard
    </a>

    <div class="w-full max-w-md animate-fade-in-up">
        <div class="glass-card p-8 rounded-3xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-500 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">Create Coordinator</h1>
                    <p class="text-sm text-slate-400">Add a new room coordinator</p>
                </div>
            </div>

            <form id="coordinatorForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Full Name</label>
                    <input type="text" id="name" placeholder="Sarah Smith" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Email Address</label>
                    <input type="email" id="email" placeholder="sarah@fest.com" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>

                <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-bold rounded-xl shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 transition-all duration-300 mt-6 flex items-center justify-center gap-2">
                    Create Coordinator
                </button>
                
                <div id="msg" class="hidden mt-4 text-center text-sm py-2 rounded-lg border"></div>
            </form>
        </div>
    </div>

    <script src="js/coordinator.js"></script>
</body>
</html>
