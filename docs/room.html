<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Rooms - GreenRoomHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#10b981', secondary: '#064e3b' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans relative p-4">

    <!-- Background Effects -->
    <div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-emerald-500/20 rounded-full blur-[100px] -z-10 mix-blend-screen"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-blue-500/20 rounded-full blur-[100px] -z-10 mix-blend-screen"></div>

    <a href="dashboard.html" class="absolute top-6 left-6 px-4 py-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-slate-300 hover:text-white flex items-center gap-2 transition-all backdrop-blur-md z-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Dashboard
    </a>

    <div class="max-w-xl mx-auto pt-20 pb-10 animate-fade-in-up">
        <div class="glass-card p-8 rounded-3xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
            <!-- Header -->
            <div class="flex items-center gap-3 mb-8">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">Create Rooms</h1>
                    <p class="text-sm text-slate-400">Bulk-create rooms &amp; auto-download QR codes</p>
                </div>
            </div>

            <form id="roomForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Base Room Name</label>
                    <input type="text" id="baseName" placeholder="e.g. Green Room" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                    <p class="text-xs text-slate-500 pl-1">Rooms will be named: Green Room 1, Green Room 2, …</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Number of Rooms</label>
                        <input type="number" id="count" placeholder="3" min="1" max="50" required
                            class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Capacity Each</label>
                        <input type="number" id="capacity" placeholder="20" min="1" required
                            class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-3.5 px-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-teal-500 hover:to-teal-400 text-slate-900 font-bold rounded-xl shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40 transition-all duration-300 mt-2 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Create Rooms &amp; Download QR Codes
                </button>

                <div id="msg" class="hidden mt-2 text-center text-sm py-2.5 px-4 rounded-xl border font-medium"></div>
            </form>

            <!-- Progress area -->
            <div id="progressArea" class="hidden mt-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Creating Rooms &amp; Downloading QRs</span>
                    <span id="progressText" class="text-xs text-emerald-400 font-bold">0%</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden mb-4">
                    <div id="progressBar" class="bg-gradient-to-r from-emerald-500 to-teal-400 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <div id="roomList" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/room.js"></script>
</body>
</html>
