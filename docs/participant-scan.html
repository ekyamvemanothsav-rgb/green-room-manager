<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR - GreenRoomHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#10b981', secondary: '#064e3b' }
                }
            }
        }
    </script>
    <!-- HTML5 QR Code library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center relative font-sans p-4">

    <!-- Background Effects -->
    <div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-yellow-500/10 rounded-full blur-[100px] -z-10 mix-blend-screen"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-emerald-500/10 rounded-full blur-[100px] -z-10 mix-blend-screen"></div>

    <a href="dashboard.html" class="absolute top-6 left-6 px-4 py-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-slate-300 hover:text-white flex items-center gap-2 transition-all backdrop-blur-md z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Dashboard
    </a>

    <div class="w-full max-w-md animate-fade-in-up">
        <div class="glass-card p-8 rounded-3xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.3)]">

            <!-- Header -->
            <div class="flex items-center gap-3 mb-6">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-yellow-500 to-amber-500 flex items-center justify-center shadow-lg shadow-yellow-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">Scan QR Code</h1>
                    <p class="text-sm text-slate-400">Point your camera at a room's QR code</p>
                </div>
            </div>

            <!-- QR Reader -->
            <div class="bg-black/50 rounded-2xl overflow-hidden mb-5 relative w-full pb-[100%] h-0">
                <div id="reader" class="absolute top-0 left-0 w-full h-full border-none"></div>
            </div>

            <!-- Scan Status (shown after scan) -->
            <div id="scanStatus" class="hidden text-center text-sm p-3 rounded-xl border mb-4 font-medium"></div>

            <!-- Result / Action Message -->
            <div id="msg" class="hidden text-center text-sm p-3 rounded-xl border mb-4 font-medium"></div>

            <!-- Action Buttons (Hidden until scanned) -->
            <div id="actionButtons" class="hidden space-y-3">

                <!-- Room label -->
                <p id="scannedRoomLabel" class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"></p>

                <!-- Check In (shown when not in room) -->
                <button id="checkInBtn" onclick="handleCheckIn()"
                    class="w-full py-3 px-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-teal-500 hover:to-teal-400 text-slate-900 font-bold rounded-xl shadow-lg shadow-emerald-500/25 transition-all duration-300 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                    </svg>
                    Check In
                </button>

                <!-- Check Out (shown when already in room) -->
                <button id="checkOutBtn" onclick="handleCheckOut()"
                    class="w-full py-3 px-4 bg-gradient-to-r from-red-500 to-rose-500 hover:from-rose-500 hover:to-rose-400 text-white font-bold rounded-xl shadow-lg shadow-red-500/25 transition-all duration-300 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Check Out
                </button>

                <!-- Scan Again -->
                <button onclick="resetScanner()"
                    class="w-full py-2.5 px-4 bg-slate-700 hover:bg-slate-600 text-white font-medium rounded-xl transition-all duration-300 flex items-center justify-center gap-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Scan Different Room
                </button>
            </div>

        </div>
    </div>

    <script src="js/participant-scan.js"></script>
</body>
</html>
