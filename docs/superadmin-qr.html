<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Codes - Green Room Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#10b981', secondary: '#064e3b' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="w-full px-6 py-4 flex justify-between items-center glass-header sticky top-0 z-50 border-b border-white/5 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-emerald-300 flex items-center justify-center shadow-lg shadow-primary/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white leading-tight">GreenRoom<span class="text-primary">Hub</span></h1>
                <p class="text-xs text-purple-400 font-medium">Super Admin · QR Panel</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button id="downloadAllBtn" onclick="downloadAllQRs()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-purple-500/20 text-purple-300 hover:bg-purple-500/30 transition-colors border border-purple-500/30 text-sm font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download All
            </button>
            <a href="dashboard.html" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors border border-white/10 text-sm font-medium text-slate-300 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Dashboard
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Page Header -->
        <div class="mb-8 animate-fade-in-up">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold text-white mb-1">Room QR Codes</h2>
                    <p class="text-slate-400 text-sm">Download QR codes for all rooms. Participants scan these to check in &amp; out.</p>
                </div>
                <span id="roomCount" class="px-3 py-1.5 rounded-full bg-purple-500/20 text-purple-400 text-sm font-bold border border-purple-500/30 hidden">
                    0 Rooms
                </span>
            </div>
        </div>

        <!-- Status bar for bulk download -->
        <div id="bulkStatus" class="hidden mb-6 glass-card rounded-2xl border border-purple-500/20 p-4 animate-fade-in-up">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-semibold text-slate-300">Downloading all QR codes…</span>
                <span id="bulkPercent" class="text-sm font-bold text-purple-400">0%</span>
            </div>
            <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                <div id="bulkBar" class="bg-gradient-to-r from-purple-500 to-indigo-400 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
            </div>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-24 animate-fade-in-up">
            <svg class="animate-spin h-10 w-10 text-primary mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <p class="text-slate-400">Loading rooms…</p>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-24 glass-card rounded-2xl border border-white/5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5" />
            </svg>
            <p class="text-slate-400 font-medium">No rooms created yet.</p>
            <a href="room.html" class="mt-4 text-sm text-emerald-400 hover:underline">Create rooms →</a>
        </div>

        <!-- QR Grid -->
        <div id="qrGrid" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 animate-fade-in-up"></div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/superadmin-qr.js"></script>
</body>
</html>
