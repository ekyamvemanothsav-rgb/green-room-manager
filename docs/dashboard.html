<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Green Room Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#10b981', secondary: '#064e3b' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans">
    
    <!-- Navbar -->
    <nav class="w-full px-6 py-4 flex justify-between items-center glass-header sticky top-0 z-50 border-b border-white/5 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-emerald-300 flex items-center justify-center shadow-lg shadow-primary/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white leading-tight">GreenRoom<span class="text-primary sm:inline hidden">Hub</span></h1>
                <p id="userRoleDisplay" class="text-xs text-primary font-medium capitalize hidden">Role</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="logout()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-colors border border-red-500/20 text-sm font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Actions Menu -->
        <div class="mb-10 animate-fade-in-up">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-white">Quick Actions</h2>
            </div>
            <div id="menu" class="flex flex-wrap gap-3 p-4 glass-card rounded-2xl border border-white/5">
                <!-- Buttons injected via JS -->
                 <p class="text-slate-400 text-sm italic w-full text-center" id="menuEmpty">Loading options...</p>
            </div>
        </div>

        <!-- Rooms Grid -->
        <div id="roomsSection" class="animate-fade-in-up animation-delay-100">
            <div class="flex items-center justify-between mb-6 border-b border-white/10 pb-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-2xl font-bold text-white">Live Rooms</h2>
                    <span class="px-2.5 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-xs font-bold border border-emerald-500/20 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                        Live
                    </span>
                </div>
            </div>
            
            <div id="rooms" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Rooms injected via JS -->
            </div>
        </div>
    </main>

    <!-- QR Modal -->
    <div id="qrModal" class="fixed inset-0 bg-slate-900/90 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in-up">
        <div class="bg-slate-800 border border-white/10 p-8 rounded-3xl max-w-sm w-full shadow-2xl relative">
            <button onclick="closeQRModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors bg-white/5 p-1 rounded-full hover:bg-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h3 id="qrRoomName" class="text-xl font-bold text-white text-center mb-6">Room QR</h3>
            <div class="bg-white p-4 rounded-2xl flex justify-center items-center mb-4 shadow-inner mx-auto w-fit">
                <img id="qrImage" src="" alt="Room QR Code" class="w-48 h-48">
            </div>
            <button onclick="downloadQRFromModal()" class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-400 font-semibold text-sm border border-emerald-500/30 transition-colors mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download QR Code
            </button>
            <p class="text-center text-sm text-slate-400">Participants scan this to check in or check out.</p>
        </div>
    </div>

    <!-- Edit Room Modal -->
    <div id="editRoomModal" class="fixed inset-0 bg-slate-900/90 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in-up">
        <div class="bg-slate-800 border border-white/10 p-8 rounded-3xl max-w-md w-full shadow-2xl relative">
            <button onclick="closeEditRoomModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors bg-white/5 p-1 rounded-full hover:bg-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h3 class="text-xl font-bold text-white text-center mb-6">Edit Room Details</h3>
            
            <form id="editRoomForm" onsubmit="saveRoomEdit(event)" class="space-y-4">
                <input type="hidden" id="editRoomId">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Room Name</label>
                    <input type="text" id="editRoomName" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Capacity</label>
                    <input type="number" id="editRoomCapacity" required min="1"
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                </div>
                
                <button type="submit" id="saveEditBtn" class="w-full py-3.5 px-4 bg-primary text-slate-900 font-bold rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all duration-300 mt-2">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
